name: CI
on:
  push:
  schedule:
    - cron: '0 1 * * *'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Test
        run: dotnet test ISDCompanion.Core.Tests/ISDCompanion.Core.Tests.csproj
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install MAUI workload
        run: dotnet workload install maui
      - name: Build MacCatalyst
        run: dotnet build ISDCompanion/ISDCompanion.csproj -f net10.0-maccatalyst -c Release
